name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.2.0)"
        required: true
        type: string
      release_description:
        description: "Release description (supports markdown)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version must be in semver format (e.g. 1.2.0)"
            exit 1
          fi

      - name: Update version in _meta.lua
        run: |
          sed -i "s/version = \".*\"/version = \"${{ inputs.version }}\"/" _meta.lua
          cat _meta.lua

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _meta.lua
          git commit -m "release: v${{ inputs.version }}"
          git push

      - name: Build release zip
        run: |
          mkdir -p filesync.koplugin
          cp _meta.lua main.lua filesync.koplugin/
          cp -r filesync filesync.koplugin/
          zip -r filesync.koplugin.zip filesync.koplugin

      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --notes "${{ inputs.release_description }}" \
            filesync.koplugin.zip
